; Custom PHP settings for Control Tower
; These settings override default PHP configuration

; Increase execution time for very long-running imports (30 minutes)
; For slow servers with 1 year of data
max_execution_time = 1800

; Increase memory limit for large file processing
memory_limit = 1024M

; Increase upload and post limits for file imports
upload_max_filesize = 50M
post_max_size = 55M

; Increase input time for slow uploads (30 minutes)
max_input_time = 1800

; Error handling
display_errors = Off
log_errors = On
error_log = /var/www/storage/logs/php_errors.log

; Date/Time
date.timezone = Asia/Jakarta
