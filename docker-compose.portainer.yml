# Control Tower - Docker Compose for Portainer
# Copy this content into Portainer Stack Web Editor
# NO BUILD REQUIRED - Uses official images

version: '3.8'

services:
  # PHP-FPM Application
  app:
    image: php:8.2-fpm
    container_name: control_tower_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - /opt/stacks/control_tower:/var/www
    environment:
      - APP_NAME=Control Tower
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://192.168.99.123:8080
      - APP_KEY=
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=control_tower
      - DB_USERNAME=control_tower
      - DB_PASSWORD=secret123
    networks:
      - control_tower_net
    depends_on:
      - db
    command: >
      bash -c "
        apt-get update && apt-get install -y libpng-dev libonig-dev libxml2-dev libzip-dev libldap2-dev zip unzip git curl &&
        docker-php-ext-install pdo_mysql mbstring exif pcntl bcmath gd zip ldap &&
        curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer &&
        cd /var/www &&
        composer install --no-dev --optimize-autoloader --no-interaction &&
        chown -R www-data:www-data /var/www/storage /var/www/bootstrap/cache &&
        php-fpm
      "

  # Nginx Web Server
  webserver:
    image: nginx:alpine
    container_name: control_tower_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - /opt/stacks/control_tower:/var/www:ro
      - /opt/stacks/control_tower/docker/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - control_tower_net
    depends_on:
      - app

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: control_tower_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: control_tower
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_USER: control_tower
      MYSQL_PASSWORD: secret123
    ports:
      - "3307:3306"
    volumes:
      - control_tower_db_data:/var/lib/mysql
    networks:
      - control_tower_net
    command: --default-authentication-plugin=mysql_native_password

networks:
  control_tower_net:
    driver: bridge

volumes:
  control_tower_db_data:
    driver: local
